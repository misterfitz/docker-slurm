name: Docker Image Testing

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  test:
    name: Slurm ${{ matrix.slurm_version }} / Rocky ${{ matrix.rocky_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Note: Rocky 8 dropped — omnivector RPMs are built against
          # glibc 2.34+ and incompatible with EL8's glibc 2.28
          - rocky_version: "9"
            slurm_version: "24.11.5"
          - rocky_version: "9"
            slurm_version: "25.05.1"
    steps:
      - name: Check Out Repository Files
        uses: actions/checkout@v4

      - name: Set Up Runner
        uses: './.github/workflows/composite-actions/setup'

      - name: Set Version Overrides
        run: |
          echo "SLURM_VERSION=${{ matrix.slurm_version }}" >> $GITHUB_ENV
          echo "CONTAINER_ROCKY_VERSION=${{ matrix.rocky_version }}" >> $GITHUB_ENV
          SLURM_SHORT=$(echo "${{ matrix.slurm_version }}" | cut -d. -f1,2)
          echo "SLURM_VERSION_SHORT=${SLURM_SHORT}" >> $GITHUB_ENV

      - name: Test Docker Image - base - standard
        if: ${{ always() }}
        uses: './.github/workflows/composite-actions/test'
        with:
          user: standard
          docker_build_context: dockerfile_base/

      - name: Test Docker Image - base - root
        if: ${{ always() }}
        uses: './.github/workflows/composite-actions/test'
        with:
          user: root
          docker_build_context: dockerfile_base/

      - name: Set BASE_TAG for Full Image Dependency
        run: |
          sv="${SLURM_VERSION_SHORT}"
          el="el${{ matrix.rocky_version }}"
          echo "TAG_BASE_ROOT=${{ env.TAG_BASE_ROOT }}-${sv}-${el}" >> $GITHUB_ENV

      - name: Build Image - base/root (full image dependency)
        uses: './.github/workflows/composite-actions/docker-build-push'
        with:
          user: root
          context: dockerfile_base/
          load: 'true'
          push: 'false'
          tags: ${{ env.DOCKER_HUB_REPO }}:${{ env.TAG_BASE_ROOT }}

      - name: Test Docker Image - full - standard
        if: ${{ always() }}
        uses: './.github/workflows/composite-actions/test'
        with:
          user: standard
          docker_build_context: dockerfile_full/
          required_images: ${{ env.DOCKER_HUB_REPO }}:${{ env.TAG_BASE_ROOT }}

      - name: Test Docker Image - full - root
        if: ${{ always() }}
        uses: './.github/workflows/composite-actions/test'
        with:
          user: root
          docker_build_context: dockerfile_full/
          required_images: ${{ env.DOCKER_HUB_REPO }}:${{ env.TAG_BASE_ROOT }}
